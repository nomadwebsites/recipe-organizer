server {
    listen 80;
    server_name _;  # Replace with your domain or VM IP if desired

    # Increase client body size for recipe images
    client_max_body_size 10M;

    # Logging
    access_log /var/log/nginx/recipe-organizer-access.log;
    error_log /var/log/nginx/recipe-organizer-error.log;

    # Proxy to Flask app running on port 5000
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (if needed in future)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Static files (optional optimization)
    location /static/ {
        proxy_pass http://127.0.0.1:5000/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
